<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Portfolio | PlanKraft</title>
  
  <style>
    /* ═══ GLOBAL RESETS & VARS ═══ */
    :root {
      --gallery-bg: #fdfdfc;
      --gallery-text-main: #1a1a1a;
      --gallery-text-muted: #6c757d;
      --gallery-accent: #c2a67e; 
      --gallery-radius: 8px;
      --ff-head: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--gallery-bg);
    }

    /* ═══ UPGRADED GALLERY STYLES ═══ */
    .gallery-section {
      background-color: var(--gallery-bg);
      padding: 8rem 5%;
    }

    .gallery-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header Styling */
    .gallery-header {
      text-align: center;
      margin-bottom: 4rem;
      max-width: 700px;
      margin-inline: auto;
    }

    .gallery-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gallery-accent);
      margin-bottom: 1rem;
      position: relative;
    }

    .gallery-label::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 2px;
      background-color: var(--gallery-accent);
    }

    .gallery-title {
      font-family: var(--ff-head, inherit);
      font-size: clamp(2rem, 4vw, 3.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--gallery-text-main);
      margin-top: 1rem;
      margin-bottom: 1.25rem;
    }

    .gallery-subtitle {
      color: var(--gallery-text-muted);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    /* Fluid Masonry Grid using Columns */
    .masonry-grid {
      column-count: 3;
      column-gap: 1.5rem;
    }

    .masonry-item {
      margin: 0 0 1.5rem 0;
      break-inside: avoid; /* Prevents images from splitting across columns */
      position: relative;
      border-radius: var(--gallery-radius);
      overflow: hidden;
      background: #e0ddd9; /* Skeleton load color */
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      transform: translateZ(0); /* Hardware acceleration */
    }

    .masonry-item img {
      width: 100%;
      height: auto; /* Respects natural image aspect ratio */
      display: block;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .masonry-item:hover img {
      transform: scale(1.06);
    }

    /* Gradient & Text Overlay */
    .masonry-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top, 
        rgba(0,0,0,0.85) 0%, 
        rgba(0,0,0,0.3) 50%, 
        transparent 100%
      );
      opacity: 0;
      display: flex;
      align-items: flex-end;
      padding: 2rem;
      transition: opacity 0.4s ease;
      z-index: 2;
    }

    .masonry-item:hover .masonry-overlay {
      opacity: 1;
    }

    .overlay-text {
      color: #ffffff;
      transform: translateY(15px);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .masonry-item:hover .overlay-text {
      transform: translateY(0);
    }

    .overlay-text h3 {
      font-family: var(--ff-head, inherit);
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 0.35rem 0;
      letter-spacing: -0.01em;
    }

    .overlay-text span {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.7);
    }

    /* Responsive Rules */
    @media (max-width: 992px) {
      .masonry-grid {
        column-count: 2;
      }
    }

    @media (max-width: 600px) {
      .gallery-section { padding: 5rem 5%; }
      
      .masonry-grid {
        column-count: 1;
      }
      
      /* On mobile, keep the overlay slightly visible so users know there is text */
      .masonry-overlay {
        opacity: 1;
        background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 80%);
        padding: 1.5rem;
      }
      
      .overlay-text {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <section class="gallery-section" id="gallery">
    <div class="gallery-container">
      
      <header class="gallery-header reveal">
        <span class="gallery-label">Our Portfolio</span>

        <p class="gallery-subtitle">Explore a curated collection of our finest architectural and design innovations.</p>

      <div class="masonry-grid">
        
        <figure class="masonry-item reveal-scale stagger-1">

        <figure class="masonry-item reveal-scale stagger-3">

        <figure class="masonry-item reveal-scale stagger-1">

          <figcaption class="masonry-overlay">
            <div class="overlay-text">

            </div>
          </figcaption>
        </figure>

        <figure class="masonry-item reveal-scale stagger-2">
          <img src="./assets/5.jpeg" alt="PlanKraft Project 5" loading="lazy">
          <figcaption class="masonry-overlay">
            <div class="overlay-text">
              <h3>Minimalist Studio</h3>
              <span>Interior Design</span>

          </figcaption>
        </figure>

        <figure class="masonry-item reveal-scale stagger-3">

          <figcaption class="masonry-overlay">
            <div class="overlay-text">

        <figure class="masonry-item reveal-scale stagger-1">

        <figure class="masonry-item reveal-scale stagger-2">

        <figure class="masonry-item reveal-scale stagger-3">

            <div class="overlay-text">

        </figure>

      </div>
    </div>
  </section>

</body>
